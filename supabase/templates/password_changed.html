<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0c0d12;
            color: #ffffff;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #12141e;
            border: 1px solid #2a2d3e;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #7c4dff, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .warning-box {
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.3);
            padding: 20px;
            border-radius: 12px;
            color: #ff5252;
            margin: 20px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">QiOne</div>
        <h2>Security Account Notification</h2>
        <div class="warning-box">The password for your account has been changed.</div>
        <p>If you performed this action, you can ignore this email.</p>
        <p>If you did not change your password, please contact support immediately to secure your account.</p>
        <div class="footer">&copy; 2026 QiAll Me.</div>
    </div>
</body>

</html>
