<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0c0d12;
            color: #ffffff;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #12141e;
            border: 1px solid #2a2d3e;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #7c4dff, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .update-box {
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.2);
            padding: 20px;
            border-radius: 12px;
            color: #00e5ff;
            margin: 20px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">QiOne</div>
        <h2>Security Update Made</h2>
        <div class="update-box">A security setting ({{ .FactorType }}{{ .Provider }}) was updated for your account.
        </div>
        <p>If you made this update, you can safely continue.</p>
        <p>If you didn't recognize this change, please sign in to your dashboard and verify your account settings.</p>
        <div class="footer">&copy; 2026 QiAll Me.</div>
    </div>
</body>

</html>
